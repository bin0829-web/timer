<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>困難拉圖斯計時</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:sans-serif;
text-align:center;
}

h2{
margin-top:30px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:40px;
}

.timer{
position:relative;
width:140px;
height:140px;
margin:auto;
}

svg{
transform:rotate(-90deg);
}

circle{
fill:none;
stroke-width:10;
}

.bg{
stroke:#333;
}

.progress{
stroke:#4da3ff;
stroke-linecap:round;
transition:stroke-dashoffset 1s linear;
}

.time{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
font-weight:bold;
}

.label{
margin-top:10px;
font-size:16px;
}

</style>
</head>

<body>

<h2>困難拉圖斯計時</h2>

<div class="container">

<!-- 時鐘 -->
<div onclick="toggleTimer(0)">
<div class="timer">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="60"/>
<circle id="c0" class="progress" cx="70" cy="70" r="60" stroke-dasharray="377"/>
</svg>
<div id="t0" class="time">10</div>
</div>
<div class="label">時鐘（89%）</div>
</div>

<!-- 小怪 -->
<div onclick="toggleTimer(1)">
<div class="timer">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="60"/>
<circle id="c1" class="progress" cx="70" cy="70" r="60" stroke-dasharray="377"/>
</svg>
<div id="t1" class="time">50</div>
</div>
<div class="label">小怪（84%）</div>
</div>

<!-- 玩家炸彈 -->
<div onclick="toggleTimer(2)">
<div class="timer">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="60"/>
<circle id="c2" class="progress" cx="70" cy="70" r="60" stroke-dasharray="377"/>
</svg>
<div id="t2" class="time">30</div>
</div>
<div class="label">玩家炸彈（84%）</div>
</div>

<!-- 反盾 -->
<div onclick="toggleTimer(3)">
<div class="timer">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="60"/>
<circle id="c3" class="progress" cx="70" cy="70" r="60" stroke-dasharray="377"/>
</svg>
<div id="t3" class="time">120</div>
</div>
<div class="label">反盾（84%）</div>
</div>

<!-- 黑水 -->
<div onclick="toggleTimer(4)">
<div class="timer">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="60"/>
<circle id="c4" class="progress" cx="70" cy="70" r="60" stroke-dasharray="377"/>
</svg>
<div id="t4" class="time">70</div>
</div>
<div class="label">黑水（69%）</div>
</div>

</div>

<script>

const timers=[
{max:10,time:10,run:false},
{max:50,time:50,run:false},
{max:30,time:30,run:false},
{max:120,time:120,run:false},
{max:70,time:70,run:false}
]

function toggleTimer(i){
timers[i].run=!timers[i].run
}

setInterval(()=>{

timers.forEach((t,i)=>{

if(!t.run)return

t.time--

if(t.time<=0){
t.time=t.max
}

document.getElementById("t"+i).innerText=t.time

let percent=t.time/t.max
let offset=377*(1-percent)

document.getElementById("c"+i)
.style.strokeDashoffset=offset

})

},1000)

</script>

</body>
</html>
