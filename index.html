<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>困難拉圖斯計時</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="rat-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="困難拉圖斯計時">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
  --bg:#061226;
  --text:#ffffff;
  --blue:#57a5ff;
  --blue2:#2f7cf6;
  --red:#ff4d4f;
  --gray:#2f3b4a;
  --hold:#ffd166;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
}

html, body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
}

body{
  text-align:center;
}

.page{
  width:100vw;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8px 12px 12px;
  position:relative;
}

h1{
  margin:4px 0 8px;
  font-size:22px;
  font-weight:800;
  line-height:1.1;
  flex:0 0 auto;
}

.top-controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:0 0 8px;
  flex-wrap:wrap;
  flex:0 0 auto;
}

button{
  border:0;
  border-radius:999px;
  padding:10px 18px;
  font-size:15px;
  font-weight:700;
  color:#fff;
  background:#1f2d3d;
}

button.primary{
  background:var(--blue2);
}

.layout{
  width:100%;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  min-height:0;
}

.row{
  width:100%;
  display:grid;
  justify-items:center;
  align-items:start;
}

.row.top{
  grid-template-columns:1fr 1fr;
  width:min(72vw, 720px);
  margin:0 auto;
}

.row.bottom{
  grid-template-columns:1fr 1fr 1fr;
  width:min(100vw, 1100px);
  margin:0 auto;
}

.item{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}

.timer-box{
  display:block;
  touch-action:manipulation;
}

.timer{
  position:relative;
  width:146px;
  height:146px;
  margin:0 auto;
}

svg{
  width:146px;
  height:146px;
  display:block;
  transform:rotate(-90deg);
}

circle{
  fill:none;
}

.hold-track{
  stroke:rgba(255,209,102,.18);
  stroke-width:4;
}

.hold-progress{
  stroke:var(--hold);
  stroke-width:4;
  stroke-linecap:round;
  opacity:0;
  transition:opacity .15s linear;
}

.pressing .hold-progress{
  opacity:1;
}

.bg{
  stroke:var(--gray);
  stroke-width:10;
}

.progress{
  stroke:var(--blue);
  stroke-width:10;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s linear, stroke .2s linear;
}

.time{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  font-weight:800;
  line-height:1;
}

.label{
  margin-top:6px;
  font-size:14px;
  line-height:1.2;
  white-space:nowrap;
}

.red .progress{
  stroke:var(--red);
}

.flash .progress{
  animation:ringFlash .8s infinite;
}

.flash .time{
  animation:textFlash .8s infinite;
}

@keyframes ringFlash{
  0%,100%{ stroke:var(--red); opacity:1; }
  50%{ stroke:#ffb3b3; opacity:.55; }
}

@keyframes textFlash{
  0%,100%{ color:#ff4d4f; opacity:1; }
  50%{ color:#ffd6d6; opacity:.55; }
}

/* 直向：84%獨立一列 */
.fab84-row{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:-2px;
  flex:0 0 auto;
}

.fab84-rail{
  position:relative;
  min-width:260px;
  height:52px;
  padding:0 18px;
  border-radius:999px;
  background:linear-gradient(90deg, rgba(47,124,246,.15), rgba(87,165,255,.28), rgba(47,124,246,.15));
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  display:flex;
  align-items:center;
  justify-content:center;
}

.fab84{
  min-width:138px;
  height:52px;
  padding:0 28px;
  border-radius:999px;
  background:linear-gradient(180deg, #4b93ff, #2f7cf6);
  color:#fff;
  font-size:18px;
  font-weight:800;
  box-shadow:0 10px 24px rgba(47,124,246,.35);
}

.fab84:active{
  transform:translateY(1px);
}

.fab84-side{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#ffd34d;
  box-shadow:0 0 12px rgba(255,211,77,.5);
  top:50%;
  transform:translateY(-50%);
  opacity:.95;
}

.fab84-side.left{ left:16px; }
.fab84-side.right{ right:16px; }

.hint{
  margin-top:2px;
  font-size:10px;
  color:rgba(255,255,255,.55);
  line-height:1.3;
  flex:0 0 auto;
}

/* 橫置專用：縮小計時器並把84%固定在底部 */
@media (orientation: landscape){
  .page{
    padding:6px 10px calc(10px + env(safe-area-inset-bottom));
  }

  h1{
    margin:2px 0 4px;
    font-size:18px;
  }

  .top-controls{
    margin:0 0 4px;
  }

  button{
    padding:8px 16px;
    font-size:13px;
  }

  .layout{
    gap:8px;
    padding-bottom:68px; /* 留給底部84% */
  }

  .row.top{
    width:min(64vw, 620px);
  }

  .row.bottom{
    width:min(96vw, 980px);
  }

  .timer{
    width:118px;
    height:118px;
  }

  svg{
    width:118px;
    height:118px;
  }

  .time{
    font-size:26px;
  }

  .label{
    margin-top:4px;
    font-size:12px;
  }

  .fab84-row{
    position:absolute;
    left:50%;
    bottom:calc(8px + env(safe-area-inset-bottom));
    transform:translateX(-50%);
    margin:0;
    z-index:20;
  }

  .fab84-rail{
    min-width:220px;
    height:46px;
  }

  .fab84{
    min-width:122px;
    height:46px;
    font-size:17px;
  }

  .fab84-side{
    width:16px;
    height:16px;
  }

  .hint{
    display:none;
  }
}

@media (orientation: portrait){
  .timer{
    width:124px;
    height:124px;
  }

  svg{
    width:124px;
    height:124px;
  }

  .time{
    font-size:28px;
  }

  .row.top,
  .row.bottom{
    width:100%;
  }

  .fab84-rail{
    min-width:220px;
    height:50px;
  }

  .fab84{
    min-width:128px;
    height:50px;
    font-size:18px;
  }
}
</style>
</head>

<body>
<div class="page">

  <h1>困難拉圖斯計時</h1>

  <div class="top-controls">
    <button onclick="resetAll()">重置全部</button>
  </div>

  <div class="layout">

    <div class="row top">
      <div class="item">
        <div class="timer-box" data-index="0">
          <div class="timer" id="wrap0">
            <svg viewBox="0 0 100 100">
              <circle class="hold-track" cx="50" cy="50" r="47"></circle>
              <circle id="hold0" class="hold-progress" cx="50" cy="50" r="47" stroke-dasharray="295" stroke-dashoffset="295"></circle>
              <circle class="bg" cx="50" cy="50" r="42"></circle>
              <circle id="c0" class="progress" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="0"></circle>
            </svg>
            <div id="t0" class="time">10</div>
          </div>
          <div class="label">時鐘（89%）</div>
        </div>
      </div>

      <div class="item">
        <div class="timer-box" data-index="4">
          <div class="timer" id="wrap4">
            <svg viewBox="0 0 100 100">
              <circle class="hold-track" cx="50" cy="50" r="47"></circle>
              <circle id="hold4" class="hold-progress" cx="50" cy="50" r="47" stroke-dasharray="295" stroke-dashoffset="295"></circle>
              <circle class="bg" cx="50" cy="50" r="42"></circle>
              <circle id="c4" class="progress" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="0"></circle>
            </svg>
            <div id="t4" class="time">70</div>
          </div>
          <div class="label">黑水（69%）</div>
        </div>
      </div>
    </div>

    <div class="row bottom">
      <div class="item">
        <div class="timer-box" data-index="1">
          <div class="timer" id="wrap1">
            <svg viewBox="0 0 100 100">
              <circle class="hold-track" cx="50" cy="50" r="47"></circle>
              <circle id="hold1" class="hold-progress" cx="50" cy="50" r="47" stroke-dasharray="295" stroke-dashoffset="295"></circle>
              <circle class="bg" cx="50" cy="50" r="42"></circle>
              <circle id="c1" class="progress" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="0"></circle>
            </svg>
            <div id="t1" class="time">50</div>
          </div>
          <div class="label">小怪（84%）</div>
        </div>
      </div>

      <div class="item">
        <div class="timer-box" data-index="2">
          <div class="timer" id="wrap2">
            <svg viewBox="0 0 100 100">
              <circle class="hold-track" cx="50" cy="50" r="47"></circle>
              <circle id="hold2" class="hold-progress" cx="50" cy="50" r="47" stroke-dasharray="295" stroke-dashoffset="295"></circle>
              <circle class="bg" cx="50" cy="50" r="42"></circle>
              <circle id="c2" class="progress" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="0"></circle>
            </svg>
            <div id="t2" class="time">30</div>
          </div>
          <div class="label">玩家炸彈（84%）</div>
        </div>
      </div>

      <div class="item">
        <div class="timer-box" data-index="3">
          <div class="timer" id="wrap3">
            <svg viewBox="0 0 100 100">
              <circle class="hold-track" cx="50" cy="50" r="47"></circle>
              <circle id="hold3" class="hold-progress" cx="50" cy="50" r="47" stroke-dasharray="295" stroke-dashoffset="295"></circle>
              <circle class="bg" cx="50" cy="50" r="42"></circle>
              <circle id="c3" class="progress" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="0"></circle>
            </svg>
            <div id="t3" class="time">120</div>
          </div>
          <div class="label">反盾（84%）</div>
        </div>
      </div>
    </div>

    <div class="fab84-row">
      <div class="fab84-rail">
        <span class="fab84-side left"></span>
        <button class="fab84" onclick="toggle84()">84%</button>
        <span class="fab84-side right"></span>
      </div>
    </div>

    <div class="hint">點一下：開始 / 暫停　　長壓 2 秒：個別重置</div>

  </div>
</div>

<script>
const CIRCUMFERENCE = 264;
const HOLD_CIRCUMFERENCE = 295;
const LONG_PRESS_MS = 2000;

const timers = [
  { max:10,  time:10,  run:false, warn:false },
  { max:50,  time:50,  run:false, warn:true  },
  { max:30,  time:30,  run:false, warn:true  },
  { max:120, time:120, run:false, warn:true  },
  { max:70,  time:70,  run:false, warn:true  }
];

const pressState = {};

function toggleTimer(i){
  timers[i].run = !timers[i].run;
}

function resetTimer(i){
  timers[i].run = false;
  timers[i].time = timers[i].max;
  render(i);
}

function toggle84(){
  const group = [1,2,3];
  const shouldRun = group.some(i => !timers[i].run);
  group.forEach(i => timers[i].run = shouldRun);
}

function resetAll(){
  timers.forEach((t, i)=>{
    t.run = false;
    t.time = t.max;
    render(i);
  });
}

function render(i){
  const t = timers[i];
  const percent = t.time / t.max;
  const offset = CIRCUMFERENCE * (1 - percent);

  document.getElementById("c" + i).style.strokeDashoffset = offset;

  const wrap = document.getElementById("wrap" + i);
  const text = document.getElementById("t" + i);

  wrap.classList.remove("red", "flash");
  text.innerText = t.time;

  if (t.warn && t.time <= 10 && t.run) {
    wrap.classList.add("red", "flash");
  }
}

function setHoldProgress(i, ratio){
  const offset = HOLD_CIRCUMFERENCE * (1 - Math.max(0, Math.min(1, ratio)));
  document.getElementById("hold" + i).style.strokeDashoffset = offset;
}

function clearHoldProgress(i){
  setHoldProgress(i, 0);
}

function startPress(i){
  cancelPress(i);

  const wrap = document.getElementById("wrap" + i);
  wrap.classList.add("pressing");
  setHoldProgress(i, 0);

  const startedAt = Date.now();

  const progressTimer = setInterval(() => {
    const elapsed = Date.now() - startedAt;
    setHoldProgress(i, elapsed / LONG_PRESS_MS);
  }, 16);

  const longTimer = setTimeout(() => {
    if (!pressState[i]) return;
    pressState[i].longPressed = true;
    clearInterval(progressTimer);
    setHoldProgress(i, 1);
    wrap.classList.remove("pressing");
    resetTimer(i);
    setTimeout(() => clearHoldProgress(i), 150);
  }, LONG_PRESS_MS);

  pressState[i] = {
    longPressed: false,
    progressTimer,
    longTimer
  };
}

function finishPress(i){
  const state = pressState[i];
  const wrap = document.getElementById("wrap" + i);
  wrap.classList.remove("pressing");

  if (!state) return;

  clearInterval(state.progressTimer);
  clearTimeout(state.longTimer);
  delete pressState[i];

  const shouldToggle = !state.longPressed;
  clearHoldProgress(i);

  if (shouldToggle) {
    toggleTimer(i);
  }
}

function cancelPress(i){
  const state = pressState[i];
  const wrap = document.getElementById("wrap" + i);
  wrap.classList.remove("pressing");

  if (!state) return;

  clearInterval(state.progressTimer);
  clearTimeout(state.longTimer);
  delete pressState[i];
  clearHoldProgress(i);
}

document.querySelectorAll(".timer-box").forEach(el => {
  const i = Number(el.dataset.index);

  el.addEventListener("pointerdown", () => startPress(i));
  el.addEventListener("pointerup", () => finishPress(i));
  el.addEventListener("pointercancel", () => cancelPress(i));
  el.addEventListener("pointerleave", () => cancelPress(i));
});

setInterval(() => {
  timers.forEach((t, i) => {
    if (!t.run) return;

    t.time--;

    if (t.time <= 0) {
      t.time = t.max;
    }

    render(i);
  });
}, 1000);

timers.forEach((_, i) => {
  render(i);
  clearHoldProgress(i);
});
</script>

</body>
</html>
