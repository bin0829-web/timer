<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>困難拉圖斯計時</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="rat-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="困難拉圖斯計時">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

:root{
--bg:#061226;
--text:#ffffff;
--blue:#57a5ff;
--blue2:#2f7cf6;
--red:#ff4d4f;
--gray:#2f3b4a;
}

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
}

body{
text-align:center;
}

.page{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:8px;
}

h1{
margin:6px 0;
font-size:20px;
font-weight:800;
}

.top-controls{
margin-bottom:8px;
}

button{
border:0;
border-radius:999px;
padding:10px 18px;
font-size:14px;
font-weight:700;
background:#1f2d3d;
color:#fff;
}

.layout{
width:100%;
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}

.row{
width:100%;
display:grid;
justify-items:center;
}

.row.top{
grid-template-columns:1fr 1fr;
}

.row.bottom{
grid-template-columns:1fr 1fr 1fr;
}

.timer{
position:relative;
width:150px;
height:150px;
}

.timer.small{
width:115px;
height:115px;
}

svg{
width:100%;
height:100%;
transform:rotate(-90deg);
}

.bg{
stroke:#2f3b4a;
stroke-width:10;
fill:none;
}

.progress{
stroke:#57a5ff;
stroke-width:10;
stroke-linecap:round;
fill:none;
transition:stroke-dashoffset 1s linear;
}

.time{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:34px;
font-weight:800;
}

.small .time{
font-size:26px;
}

.label{
margin-top:4px;
font-size:14px;
}

.red .progress{
stroke:#ff4d4f;
}

.flash{
animation:flash 0.8s infinite;
}

@keyframes flash{
0%,100%{opacity:1;}
50%{opacity:0.5;}
}

.fab84{
margin-top:8px;
border-radius:999px;
padding:12px 28px;
background:#2f7cf6;
font-size:18px;
font-weight:800;
}

</style>
</head>

<body>

<div class="page">

<h1>困難拉圖斯計時</h1>

<div class="top-controls">
<button onclick="resetAll()">重置全部</button>
</div>

<div class="layout">

<div class="row top">

<div>
<div class="timer" id="wrap0">
<svg viewBox="0 0 100 100">
<circle class="bg" cx="50" cy="50" r="42"></circle>
<circle id="c0" class="progress" cx="50" cy="50" r="42"
stroke-dasharray="264"
stroke-dashoffset="0"></circle>
</svg>
<div id="t0" class="time">10</div>
</div>
<div class="label">時鐘（89%）</div>
</div>

<div>
<div class="timer" id="wrap4">
<svg viewBox="0 0 100 100">
<circle class="bg" cx="50" cy="50" r="42"></circle>
<circle id="c4" class="progress" cx="50" cy="50" r="42"
stroke-dasharray="264"
stroke-dashoffset="0"></circle>
</svg>
<div id="t4" class="time">70</div>
</div>
<div class="label">黑水（69%）</div>
</div>

</div>


<div class="row bottom">

<div>
<div class="timer small" id="wrap1">
<svg viewBox="0 0 100 100">
<circle class="bg" cx="50" cy="50" r="42"></circle>
<circle id="c1" class="progress" cx="50" cy="50" r="42"
stroke-dasharray="264"
stroke-dashoffset="0"></circle>
</svg>
<div id="t1" class="time">50</div>
</div>
<div class="label">小怪（84%）</div>
</div>


<div>
<div class="timer small" id="wrap2">
<svg viewBox="0 0 100 100">
<circle class="bg" cx="50" cy="50" r="42"></circle>
<circle id="c2" class="progress" cx="50" cy="50" r="42"
stroke-dasharray="264"
stroke-dashoffset="0"></circle>
</svg>
<div id="t2" class="time">35</div>
</div>
<div class="label">玩家炸彈（84%）</div>
</div>


<div>
<div class="timer small" id="wrap3">
<svg viewBox="0 0 100 100">
<circle class="bg" cx="50" cy="50" r="42"></circle>
<circle id="c3" class="progress" cx="50" cy="50" r="42"
stroke-dasharray="264"
stroke-dashoffset="0"></circle>
</svg>
<div id="t3" class="time">120</div>
</div>
<div class="label">反盾（84%）</div>
</div>

</div>

<button class="fab84" onclick="toggle84()">84%</button>

</div>
</div>


<script>

const CIRC=264

const timers=[
{max:10,time:10,run:false,warn:false},
{max:50,time:50,run:false,warn:true},
{max:35,time:35,run:false,warn:true},
{max:120,time:120,run:false,warn:true},
{max:70,time:70,run:false,warn:true}
]

function toggleTimer(i){
timers[i].run=!timers[i].run
}

function toggle84(){
[1,2,3].forEach(i=>timers[i].run=true)
}

function resetAll(){
timers.forEach((t,i)=>{
t.run=false
t.time=t.max
render(i)
})
}

function render(i){

let t=timers[i]

let percent=t.time/t.max

let offset=CIRC*(1-percent)

document.getElementById("c"+i).style.strokeDashoffset=offset

let wrap=document.getElementById("wrap"+i)

wrap.classList.remove("red","flash")

document.getElementById("t"+i).innerText=t.time

if(t.warn && t.time<=10 && t.run){

wrap.classList.add("red","flash")

}

}

document.querySelectorAll(".timer").forEach((el,i)=>{

el.addEventListener("click",()=>toggleTimer(i))

})

setInterval(()=>{

timers.forEach((t,i)=>{

if(!t.run)return

t.time--

if(t.time<=0)t.time=t.max

render(i)

})

},1000)

timers.forEach((t,i)=>render(i))

</script>

</body>
</html>
