<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>困難拉圖斯計時</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="rat-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="困難拉圖斯計時">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
  --bg:#061226;
  --text:#ffffff;
  --blue:#57a5ff;
  --blue2:#2f7cf6;
  --red:#ff4d4f;
  --gray:#2f3b4a;
  --hold:#ffd166;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
}

html, body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
}

body{
  text-align:center;
}

.page{
  width:100vw;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8px 10px calc(10px + env(safe-area-inset-bottom));
  position:relative;
}

h1{
  margin:4px 0 6px;
  font-size:20px;
  font-weight:800;
  line-height:1.1;
  flex:0 0 auto;
}

.top-controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:0 0 6px;
  flex-wrap:wrap;
  flex:0 0 auto;
}

button{
  border:0;
  border-radius:999px;
  padding:10px 18px;
  font-size:14px;
  font-weight:700;
  background:#1f2d3d;
  color:#fff;
}

.layout{
  width:100%;
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.row{
  width:100%;
  display:grid;
  justify-items:center;
  align-items:start;
}

.row.top{
  grid-template-columns:1fr 1fr;
}

.row.bottom{
  grid-template-columns:1fr 1fr 1fr;
}

.item{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.timer{
  position:relative;
  width:138px;
  height:138px;
}

.timer.small{
  width:108px;
  height:108px;
}

svg{
  width:100%;
  height:100%;
  transform:rotate(-90deg);
  position:relative;
  z-index:2;
}

.bg{
  stroke:#2f3b4a;
  stroke-width:10;
  fill:none;
}

.progress{
  stroke:#57a5ff;
  stroke-width:10;
  stroke-linecap:round;
  fill:none;
  transition:stroke-dashoffset 1s linear;
}

.hold-track{
  stroke:rgba(255,209,102,.18);
  stroke-width:4;
  fill:none;
}

.hold-progress{
  stroke:var(--hold);
  stroke-width:4;
  stroke-linecap:round;
  fill:none;
  opacity:0;
  transition:opacity .15s linear;
}

.pressing .hold-progress{
  opacity:1;
}

.time{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  font-weight:800;
  z-index:3;
}

.small .time{
  font-size:22px;
}

.label{
  margin-top:4px;
  font-size:13px;
  line-height:1.2;
  white-space:nowrap;
}

/* 背景圖 */
.timer::before{
  content:"";
  position:absolute;
  inset:18%;
  background-size:cover;
  background-repeat:no-repeat;
  background-position:center;
  opacity:.5;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
}

.clock-bg::before{
  background-image:url("IMG_1033.jpeg");
}

.blackwater-bg::before{
  background-image:url("IMG_1035.jpeg");
}

.bomb-bg::before{
  background-image:url("IMG_1039.jpeg");
}

.monster-bg::before{
  background-image:url("IMG_1040.jpeg");
}

.shield-bg::before{
  background-image:url("IMG_1041.jpeg");
}

.red .progress{
  stroke:#ff4d4f;
}

.flash{
  animation:flash .8s infinite;
}

@keyframes flash{
  0%,100%{opacity:1;}
  50%{opacity:.4;}
}

.fab84{
  margin-top:6px;
  border-radius:999px;
  padding:11px 26px;
  background:#2f7cf6;
  font-size:18px;
  font-weight:800;
}

.hint{
  font-size:10px;
  opacity:.6;
  margin-top:2px;
}

/* 橫置最重要的修正 */
@media (orientation: landscape){
  .page{
    padding:4px 8px calc(6px + env(safe-area-inset-bottom));
  }

  h1{
    margin:2px 0 4px;
    font-size:18px;
  }

  .top-controls{
    margin:0 0 4px;
  }

  button{
    padding:8px 14px;
    font-size:12px;
  }

  .layout{
    gap:6px;
    padding-bottom:50px; /* 預留給 84% 按鈕 */
  }

  .timer{
    width:124px;
    height:124px;
  }

  .timer.small{
    width:92px;
    height:92px;
  }

  .time{
    font-size:28px;
  }

  .small .time{
    font-size:18px;
  }

  .label{
    margin-top:2px;
    font-size:11px;
  }

  .fab84{
    position:absolute;
    left:50%;
    bottom:calc(4px + env(safe-area-inset-bottom));
    transform:translateX(-50%);
    margin-top:0;
    padding:10px 24px;
    font-size:17px;
    z-index:20;
  }

  .hint{
    display:none;
  }
}

/* 很窄但很高的情況微調 */
@media (max-height: 430px) and (orientation: landscape){
  h1{
    font-size:16px;
    margin:1px 0 3px;
  }

  .timer{
    width:114px;
    height:114px;
  }

  .timer.small{
    width:84px;
    height:84px;
  }

  .time{
    font-size:24px;
  }

  .small .time{
    font-size:16px;
  }

  .label{
    font-size:10px;
  }

  .layout{
    padding-bottom:46px;
  }

  .fab84{
    padding:8px 22px;
    font-size:16px;
  }
}
</style>
</head>

<body>
<div class="page">

  <h1>困難拉圖斯計時</h1>

  <div class="top-controls">
    <button onclick="resetAll()">重置全部</button>
  </div>

  <div class="layout">

    <div class="row top">

      <div class="item">
        <div class="timer clock-bg" id="wrap0" data-index="0">
          <svg viewBox="0 0 100 100">
            <circle class="hold-track" cx="50" cy="50" r="47"></circle>
            <circle id="hold0" class="hold-progress" cx="50" cy="50" r="47"
              stroke-dasharray="295"
              stroke-dashoffset="295"></circle>
            <circle class="bg" cx="50" cy="50" r="42"></circle>
            <circle id="c0" class="progress" cx="50" cy="50" r="42"
              stroke-dasharray="264"
              stroke-dashoffset="0"></circle>
          </svg>
          <div id="t0" class="time">10</div>
        </div>
        <div class="label">時鐘（89%）</div>
      </div>

      <div class="item">
        <div class="timer blackwater-bg" id="wrap4" data-index="4">
          <svg viewBox="0 0 100 100">
            <circle class="hold-track" cx="50" cy="50" r="47"></circle>
            <circle id="hold4" class="hold-progress" cx="50" cy="50" r="47"
              stroke-dasharray="295"
              stroke-dashoffset="295"></circle>
            <circle class="bg" cx="50" cy="50" r="42"></circle>
            <circle id="c4" class="progress" cx="50" cy="50" r="42"
              stroke-dasharray="264"
              stroke-dashoffset="0"></circle>
          </svg>
          <div id="t4" class="time">70</div>
        </div>
        <div class="label">黑水（69%）</div>
      </div>

    </div>

    <div class="row bottom">

      <div class="item">
        <div class="timer small monster-bg" id="wrap1" data-index="1">
          <svg viewBox="0 0 100 100">
            <circle class="hold-track" cx="50" cy="50" r="47"></circle>
            <circle id="hold1" class="hold-progress" cx="50" cy="50" r="47"
              stroke-dasharray="295"
              stroke-dashoffset="295"></circle>
            <circle class="bg" cx="50" cy="50" r="42"></circle>
            <circle id="c1" class="progress" cx="50" cy="50" r="42"
              stroke-dasharray="264"
              stroke-dashoffset="0"></circle>
          </svg>
          <div id="t1" class="time">50</div>
        </div>
        <div class="label">小怪（84%）</div>
      </div>

      <div class="item">
        <div class="timer small bomb-bg" id="wrap2" data-index="2">
          <svg viewBox="0 0 100 100">
            <circle class="hold-track" cx="50" cy="50" r="47"></circle>
            <circle id="hold2" class="hold-progress" cx="50" cy="50" r="47"
              stroke-dasharray="295"
              stroke-dashoffset="295"></circle>
            <circle class="bg" cx="50" cy="50" r="42"></circle>
            <circle id="c2" class="progress" cx="50" cy="50" r="42"
              stroke-dasharray="264"
              stroke-dashoffset="0"></circle>
          </svg>
          <div id="t2" class="time">35</div>
        </div>
        <div class="label">玩家炸彈（84%）</div>
      </div>

      <div class="item">
        <div class="timer small shield-bg" id="wrap3" data-index="3">
          <svg viewBox="0 0 100 100">
            <circle class="hold-track" cx="50" cy="50" r="47"></circle>
            <circle id="hold3" class="hold-progress" cx="50" cy="50" r="47"
              stroke-dasharray="295"
              stroke-dashoffset="295"></circle>
            <circle class="bg" cx="50" cy="50" r="42"></circle>
            <circle id="c3" class="progress" cx="50" cy="50" r="42"
              stroke-dasharray="264"
              stroke-dashoffset="0"></circle>
          </svg>
          <div id="t3" class="time">120</div>
        </div>
        <div class="label">反盾（84%）</div>
      </div>

    </div>

    <button class="fab84" id="btn84">84%</button>

    <div class="hint">點一下：開始 / 暫停　長壓0.8秒：重置　長壓84%：重置三個84%</div>

  </div>
</div>

<script>
const CIRC = 264;
const HOLD_CIRC = 295;
const LONG_PRESS_MS = 800;

const timers = [
  {max:10,  time:10,  run:false, warn:false},
  {max:50,  time:50,  run:false, warn:true },
  {max:35,  time:35,  run:false, warn:true },
  {max:120, time:120, run:false, warn:true },
  {max:70,  time:70,  run:false, warn:true }
];

const timerPress = {};
let press84 = null;
let press84Triggered = false;
let press84Progress = null;

function toggleTimer(i){
  timers[i].run = !timers[i].run;
}

function toggle84(){
  [1,2,3].forEach(i => timers[i].run = true);
}

function resetTimer(i){
  timers[i].run = false;
  timers[i].time = timers[i].max;
  render(i);
}

function reset84(){
  [1,2,3].forEach(i => resetTimer(i));
}

function resetAll(){
  timers.forEach((t,i)=>{
    t.run = false;
    t.time = t.max;
    render(i);
  });
}

function render(i){
  const t = timers[i];
  const percent = t.time / t.max;
  const offset = CIRC * (1 - percent);

  document.getElementById("c"+i).style.strokeDashoffset = offset;

  const wrap = document.getElementById("wrap"+i);
  wrap.classList.remove("red","flash");

  document.getElementById("t"+i).innerText = t.time;

  if(t.warn && t.time <= 10 && t.run){
    wrap.classList.add("red","flash");
  }
}

function setHoldProgress(i, ratio){
  const offset = HOLD_CIRC * (1 - Math.max(0, Math.min(1, ratio)));
  document.getElementById("hold"+i).style.strokeDashoffset = offset;
}

function clearHoldProgress(i){
  setHoldProgress(i, 0);
}

function bindTimerPress(el, i){
  el.addEventListener("pointerdown", () => {
    el.classList.add("pressing");
    clearHoldProgress(i);
    const startAt = Date.now();

    const progressId = setInterval(() => {
      const ratio = (Date.now() - startAt) / LONG_PRESS_MS;
      setHoldProgress(i, ratio);
    }, 16);

    timerPress[i] = {
      fired:false,
      progressId,
      id:setTimeout(() => {
        timerPress[i].fired = true;
        clearInterval(timerPress[i].progressId);
        setHoldProgress(i, 1);
        resetTimer(i);
        setTimeout(() => {
          clearHoldProgress(i);
          el.classList.remove("pressing");
        }, 120);
      }, LONG_PRESS_MS)
    };
  });

  el.addEventListener("pointerup", () => {
    if(!timerPress[i]) return;
    clearTimeout(timerPress[i].id);
    clearInterval(timerPress[i].progressId);
    const fired = timerPress[i].fired;
    delete timerPress[i];
    clearHoldProgress(i);
    el.classList.remove("pressing");
    if(!fired){
      toggleTimer(i);
    }
  });

  el.addEventListener("pointerleave", () => {
    if(!timerPress[i]) return;
    clearTimeout(timerPress[i].id);
    clearInterval(timerPress[i].progressId);
    delete timerPress[i];
    clearHoldProgress(i);
    el.classList.remove("pressing");
  });

  el.addEventListener("pointercancel", () => {
    if(!timerPress[i]) return;
    clearTimeout(timerPress[i].id);
    clearInterval(timerPress[i].progressId);
    delete timerPress[i];
    clearHoldProgress(i);
    el.classList.remove("pressing");
  });
}

document.querySelectorAll(".timer[data-index]").forEach((el)=>{
  const i = Number(el.dataset.index);
  bindTimerPress(el, i);
});

const btn84 = document.getElementById("btn84");

btn84.addEventListener("pointerdown", () => {
  press84Triggered = false;
  const startAt = Date.now();

  press84Progress = setInterval(() => {
    const ratio = (Date.now() - startAt) / LONG_PRESS_MS;
    btn84.style.boxShadow = `0 0 0 ${Math.min(8, ratio * 8)}px rgba(255,209,102,.35)`;
  }, 16);

  press84 = setTimeout(() => {
    press84Triggered = true;
    clearInterval(press84Progress);
    btn84.style.boxShadow = "0 0 0 8px rgba(255,209,102,.35)";
    reset84();
    setTimeout(() => {
      btn84.style.boxShadow = "";
    }, 120);
  }, LONG_PRESS_MS);
});

btn84.addEventListener("pointerup", () => {
  if(press84){
    clearTimeout(press84);
    press84 = null;
  }
  if(press84Progress){
    clearInterval(press84Progress);
    press84Progress = null;
  }

  if(!press84Triggered){
    btn84.style.boxShadow = "";
    toggle84();
  } else {
    setTimeout(() => { btn84.style.boxShadow = ""; }, 50);
  }
});

btn84.addEventListener("pointerleave", () => {
  if(press84){
    clearTimeout(press84);
    press84 = null;
  }
  if(press84Progress){
    clearInterval(press84Progress);
    press84Progress = null;
  }
  btn84.style.boxShadow = "";
});

btn84.addEventListener("pointercancel", () => {
  if(press84){
    clearTimeout(press84);
    press84 = null;
  }
  if(press84Progress){
    clearInterval(press84Progress);
    press84Progress = null;
  }
  btn84.style.boxShadow = "";
});

setInterval(()=>{
  timers.forEach((t,i)=>{
    if(!t.run) return;
    t.time--;
    if(t.time <= 0) t.time = t.max;
    render(i);
  });
}, 1000);

timers.forEach((t,i)=>render(i));
for(let i=0;i<timers.length;i++){
  clearHoldProgress(i);
}
</script>

</body>
</html>
